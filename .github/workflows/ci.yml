name: RSMA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - name: Memory Engine Tests
        run: cd memory-engine && npm install && npx vitest run
      - name: Stress Test
        run: cd memory-engine && npx vitest run test/rsma-stress.test.ts
      - name: Failure Injection Tests
        run: cd memory-engine && npx vitest run test/rsma-failure-injection.test.ts
      - name: Source Tests
        run: npx vitest run --config vitest.config.ts

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Verify dist output exists
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/cli/clawcore.js || (echo "dist/cli/clawcore.js missing" && exit 1)
      - name: Smoke test (binary runs)
        run: node bin/clawcore.mjs --version
